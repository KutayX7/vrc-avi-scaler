[metadata]
Version = 0.1

[OSC server]
IP = 127.0.0.1
Port = 9001

[OSC client]
IP = 127.0.0.1
Port = 9000

[limits]
MinHeight = 0.01
MaxHeight = 10000

[experimental.smoothScaling]
; These are some options for the experimental
; smooth scaling feature (where scaling takes time).

; LengthSeconds is the time (in seconds) it takes to reach the target scale.
LengthSeconds = 10.0

; Make sure StepLengthSeconds matches your lowest frame time!
; Use the formula: StepLengthSeconds = (1 / YourMaxFPS)
; Default value is for 60 FPS.
StepLengthSeconds = 0.016666667
